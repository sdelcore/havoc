name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Cheap jobs (run on every PR) ----------------------------------------

  urdf-lint:
    name: URDF lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install xacro + urdf checker
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-pip liburdfdom-tools
          pip3 install --break-system-packages xacro
      - name: Process xacro
        run: xacro ros/src/havoc_description/urdf/havoc.urdf.xacro > /tmp/havoc.urdf
      - name: Validate URDF
        run: check_urdf /tmp/havoc.urdf

  ros-build:
    name: ROS colcon build
    runs-on: ubuntu-latest
    container: ros:jazzy-ros-base
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ros-jazzy-xacro \
            python3-colcon-common-extensions
      - name: colcon build
        shell: bash
        run: |
          . /opt/ros/jazzy/setup.bash
          cd ros
          colcon build --packages-select havoc_description --symlink-install
      - name: colcon test
        shell: bash
        run: |
          . /opt/ros/jazzy/setup.bash
          cd ros
          colcon test --packages-select havoc_description --return-code-on-test-failure

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install --break-system-packages yamllint
      - name: Lint bridge yaml and west manifest
        # -d relaxed: tolerate our existing style (long lines, comments)
        run: |
          yamllint -d relaxed \
            ros/src/havoc_description/config/ros_gz_bridge.yaml \
            mcu/manifest/west.yml \
            sim/docker-compose.yml \
            .github/workflows/ci.yml

  hadolint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: hadolint Dockerfile.ros
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: sim/Dockerfile.ros
          failure-threshold: error
      - name: hadolint Dockerfile.zephyr
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: sim/Dockerfile.zephyr
          failure-threshold: error

  # --- Path-filtered jobs --------------------------------------------------

  # Detect whether MCU-relevant paths changed in this PR. Used to gate the
  # heavy zephyr-build job below.
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      mcu: ${{ steps.filter.outputs.mcu }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mcu:
              - 'mcu/**'
              - 'flake.nix'
              - '.github/workflows/ci.yml'

  # --- Heavy jobs (mcu/ changes only) --------------------------------------

  zephyr-build:
    name: Zephyr native_sim build
    needs: detect-changes
    if: needs.detect-changes.outputs.mcu == 'true'
    # Plain Ubuntu instead of zephyrprojectrtos/ci: its bundled
    # all-architectures SDK is >5 GB and overflows the runner's 14 GB
    # disk before any step can run. We install only what we need
    # (host toolchain + Zephyr SDK arm + Python build deps).
    runs-on: ubuntu-24.04
    steps:
      - name: Free disk space
        # Strips ~10 GB of pre-installed tooling we don't need (Android
        # SDK, dotnet, CodeQL caches, large dockerd images). Has to be
        # the first step so we don't blow disk on the Zephyr workspace.
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - uses: actions/checkout@v4

      - name: Install Zephyr build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git cmake ninja-build gperf ccache dfu-util device-tree-compiler wget \
            python3-dev python3-pip python3-setuptools python3-wheel python3-venv \
            xz-utils file make gcc g++ \
            libsdl2-dev libmagic1

      - name: Install Python deps (Zephyr + micro-ROS libmicroros build)
        run: |
          pip3 install --no-cache-dir --break-system-packages \
            west pyelftools pyyaml pykwalify jsonschema \
            colcon-common-extensions catkin_pkg lark-parser empy

      - name: Cache Zephyr SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /opt/zephyr-sdk-1.0.1
          key: zephyr-sdk-1.0.1-linux-x86_64

      - name: Install Zephyr SDK 1.0.1 (arm + host)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v1.0.1/zephyr-sdk-1.0.1_linux-x86_64_minimal.tar.xz
          sudo tar -xJf zephyr-sdk-1.0.1_linux-x86_64_minimal.tar.xz -C /opt
          rm zephyr-sdk-1.0.1_linux-x86_64_minimal.tar.xz
          (cd /opt/zephyr-sdk-1.0.1 && sudo ./setup.sh -t arm-zephyr-eabi -h -c)

      - name: Register SDK with cmake (cache-hit path)
        if: steps.cache-sdk.outputs.cache-hit == 'true'
        run: (cd /opt/zephyr-sdk-1.0.1 && sudo ./setup.sh -t arm-zephyr-eabi -h -c)

      - name: Configure git safe.directory
        run: git config --global --add safe.directory '*'

      - name: Cache Zephyr + module sources
        uses: actions/cache@v4
        with:
          path: |
            mcu/zephyr
            mcu/modules
            mcu/.west
          # Bust the cache when the manifest changes (Zephyr/module pin bumps).
          key: zephyr-sources-${{ hashFiles('mcu/manifest/west.yml') }}
          restore-keys: |
            zephyr-sources-

      - name: West init + update
        working-directory: mcu
        run: |
          if [ ! -d .west ]; then
            west init -l manifest/
          fi
          west update --narrow

      - name: West build (native_sim/native/64)
        working-directory: mcu
        run: |
          west build -b native_sim/native/64 app -p

      - name: Smoke-run the binary (boot only)
        working-directory: mcu
        # The binary blocks waiting for a micro-ROS agent in CI; we just
        # check it boots and prints its start banner within a few seconds.
        run: |
          timeout 3 ./build/zephyr/zephyr.exe 2>&1 | tee /tmp/boot.log || true
          grep -q "havoc_mcu starting" /tmp/boot.log
