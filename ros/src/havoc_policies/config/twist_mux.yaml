# twist_mux config: priority arbitration over /cmd_vel sources.
#
# Each topic key (constant, teleop, ...) is a logical "policy slot".
# Higher priority wins; if the highest-priority source goes silent for
# `timeout` seconds, the mux falls through to the next-priority source.
#
# Convention: keep this file in sync with the entry_points in
# havoc_policies/setup.py — every policy executable should have a matching
# `cmd_vel_<name>` entry here.

twist_mux:
  ros__parameters:
    # use_stamped=false makes the mux speak Twist on both sides. Default
    # is TwistStamped (REP-2009), but our ros_gz_bridge config maps
    # /cmd_vel as Twist, so we stay on Twist end-to-end. If/when the
    # bridge is updated to TwistStamped, flip this and update BasePolicy
    # to publish TwistStamped instead.
    use_stamped: false
    topics:
      # Human override. Wins against every autonomous source. Comes from
      # teleop_twist_keyboard remapped to cmd_vel_teleop by the launch file.
      teleop:
        topic   : cmd_vel_teleop
        timeout : 0.5
        priority: 100

      # Nav2's controller output. Placeholder until Nav2PolicyAdapter ships.
      nav2:
        topic   : cmd_vel_nav2
        timeout : 0.5
        priority: 50

      # Pure pursuit path follower. Placeholder until PurePursuitPolicy ships.
      pure_pursuit:
        topic   : cmd_vel_pure_pursuit
        timeout : 0.5
        priority: 40

      # Learned RL policy. Placeholder until RLPolicy ships.
      rl:
        topic   : cmd_vel_rl
        timeout : 0.5
        priority: 30

      # Reactive exploration / fallback. Placeholder.
      explorer:
        topic   : cmd_vel_explorer
        timeout : 0.5
        priority: 20

      # Fixed-velocity demo policy. Lowest priority so anything else
      # overrides it; used for CI smoke tests and the circle demo.
      constant:
        topic   : cmd_vel_constant
        timeout : 0.5
        priority: 10
