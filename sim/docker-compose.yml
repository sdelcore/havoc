services:
  ros:
    build:
      context: .
      dockerfile: Dockerfile.ros
    image: havoc-sim:ros-jazzy
    container_name: havoc-sim-ros
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - XDG_RUNTIME_DIR=/tmp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../ros:/workspace
      - ../training:/training

  microros-agent:
    image: microros/micro-ros-agent:jazzy
    container_name: havoc-sim-microros-agent
    network_mode: host
    command: udp4 --port 8888 -v6
    restart: unless-stopped

  zephyr:
    build:
      context: .
      dockerfile: Dockerfile.zephyr
    image: havoc-sim:zephyr
    container_name: havoc-sim-zephyr
    network_mode: host
    cap_add:
      - NET_ADMIN   # for creating the zeth TAP interface native_sim wants
    volumes:
      - ../mcu:/workspace
    devices:
      - /dev/net/tun
