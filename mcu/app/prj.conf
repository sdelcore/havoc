CONFIG_LOG=y
CONFIG_PRINTK=y

# Enable %f / %g in LOG_* and printk so cmd_vel values render. Default
# Zephyr cbprintf strips float support to save flash on MCU builds.
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_REQUIRES_FULL_LIBC=y

# micro-ROS. CONFIG_MICROROS=y is the magic flag; the rest are deps
# the libmicroros module needs to link. UDP transport for native_sim
# (works over the host's loopback to the agent).
CONFIG_MICROROS=y
CONFIG_MICROROS_TRANSPORT_UDP=y
CONFIG_CPP=y
CONFIG_NEWLIB_LIBC=y
CONFIG_POSIX_API=y
CONFIG_MAIN_STACK_SIZE=25000

# Agent the UDP transport opens to. On native_sim we talk over the zeth
# TAP interface created by docker; the host side of that TAP is 192.0.2.2
# where the agent (ros-jazzy-micro-ros-agent) listens. On real hardware
# this becomes the companion (Pi/Orin) IP.
CONFIG_MICROROS_AGENT_IP="192.0.2.2"
CONFIG_MICROROS_AGENT_PORT="8888"

# rclc resource limits. One of each is enough for the M4 publisher;
# bump as M5 (cmd_vel subscriber) and M6 (watchdog timer) land.
CONFIG_MICROROS_NODES="1"
CONFIG_MICROROS_PUBLISHERS="1"
CONFIG_MICROROS_SUBSCRIBERS="1"
CONFIG_MICROROS_CLIENTS="0"
CONFIG_MICROROS_SERVERS="0"

# Networking for UDP transport.
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y

# Static IP on the zeth TAP. The host side of zeth is 192.0.2.2, so we
# take 192.0.2.1 for the Zephyr-side interface.
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.0.2.2"

# Net stack buffers - sized from zephyr/samples/net/sockets/echo_server.
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_MAX_CONTEXTS=10
