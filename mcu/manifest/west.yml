# Havoc west manifest.
#
# Defines the Zephyr workspace pulled into ./mcu/ on `west update`.
# The Zephyr revision here MUST match the `zephyr.url` pin in flake.nix
# so the SDK and the source tree agree.
#
# Topology: T2 (manifest lives inside the workspace, at mcu/manifest/).
# Workspace topdir is mcu/. After `west init -l manifest/ && west update`
# you will see mcu/zephyr/, mcu/modules/, etc. populated.

manifest:
  remotes:
    - name: upstream
      url-base: https://github.com/zephyrproject-rtos

  projects:
    - name: zephyr
      remote: upstream
      revision: v4.4.0
      # name-allowlist keeps the workspace small. Add modules here as new
      # milestones need them. The build will fail loudly if something we
      # actually depend on is missing - that's the cue to add it.
      import:
        name-allowlist:
          - cmsis           # ARM CMSIS, generally referenced by Zephyr's core
          - cmsis_6         # newer CMSIS, used by some v4.4+ subsystems
          - hal_atmel       # SAM E70 - phase 3 of the Zephyr plan
          - picolibc        # default Zephyr libc
          - mbedtls         # transport-layer crypto, micro-ROS dep
          - segger          # RTT logging - useful on real hardware

  self:
    path: manifest
